<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raven Slides — Raven Suite</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+CiAgPHJlY3QgeD0iNCIgeT0iNCIgd2lkdGg9IjU2IiBoZWlnaHQ9IjU2IiByeD0iMTIiIHJ5PSIxMiIgZmlsbD0id2hpdGUiLz4KICA8dGV4dCB4PSIzMiIgeT0iNDYiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZvbnQtZmFtaWx5PSInSW50ZXInLCAnT3BlbiBTYW5zJywgc2Fucy1zZXJpZiIgZm9udC1zaXplPSI0MCIgZm9udC13ZWlnaHQ9IjcwMCIgZmlsbD0iIzBmMTcyOSI+UjwvdGV4dD4KPC9zdmc+Cg==">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pptxgenjs/3.12.0/pptxgen.bundle.min.js"></script>
<style>
  :root{
    --ink:#0d0d12; --graphite:#3a3a44; --mist:#86868f;
    --canvas:#eef0f4; --paper:#ffffff;
    --hairline:rgba(13,13,18,.09);
    --raven-a:#5b4bdb; --raven-b:#7b5cf0; --raven-c:#3aa6c9;
    --raven-grad:linear-gradient(120deg,#5b4bdb 0%,#7b5cf0 45%,#3aa6c9 100%);
    --glass:rgba(255,255,255,.72); --glass-border:rgba(255,255,255,.55);
    --shadow-soft:0 1px 2px rgba(13,13,18,.05),0 8px 28px rgba(13,13,18,.09);
    --shadow-pop:0 2px 8px rgba(13,13,18,.10),0 18px 48px rgba(13,13,18,.16);
    --btn-hover:rgba(13,13,18,.06); --btn-active:rgba(91,75,219,.12);
    --accent-text:#5b4bdb;
  }
  [data-theme="dark"]{
    --ink:#f2f2f6; --graphite:#c9c9d2; --mist:#8b8b96;
    --canvas:#121217; --paper:#1d1d24;
    --hairline:rgba(255,255,255,.10);
    --glass:rgba(29,29,36,.72); --glass-border:rgba(255,255,255,.08);
    --shadow-soft:0 1px 2px rgba(0,0,0,.4),0 8px 28px rgba(0,0,0,.45);
    --shadow-pop:0 2px 8px rgba(0,0,0,.5),0 18px 48px rgba(0,0,0,.6);
    --btn-hover:rgba(255,255,255,.08); --btn-active:rgba(123,92,240,.22);
    --accent-text:#9d86ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--canvas);color:var(--ink);overflow:hidden;-webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit}

  .titlebar{
    height:52px;display:flex;align-items:center;gap:14px;padding:0 18px;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
    border-bottom:1px solid var(--hairline);position:relative;z-index:40;
  }
  .logo-text{font-size:13.5px;font-weight:600;letter-spacing:-.01em;flex-shrink:0;user-select:none}
  .logo-text span{color:var(--mist);font-weight:500}
  .doc-title{
    flex:0 1 auto;min-width:120px;max-width:300px;font-size:13.5px;font-weight:500;color:var(--ink);
    border:none;outline:none;background:transparent;text-align:center;padding:6px 12px;border-radius:8px;
  }
  .doc-title:hover{background:var(--btn-hover)}
  .doc-title:focus{background:var(--btn-hover);box-shadow:0 0 0 2px var(--raven-a)}
  .titlebar-center{flex:1;display:flex;justify-content:center}
  .titlebar-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .tb-btn{
    height:30px;padding:0 13px;border-radius:8px;border:1px solid var(--hairline);background:transparent;
    color:var(--ink);font-size:12.5px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;
    transition:background .15s,transform .1s;
  }
  .tb-btn:hover{background:var(--btn-hover)} .tb-btn:active{transform:scale(.97)}
  .tb-btn.primary{background:var(--raven-grad);color:#fff;border:none;box-shadow:0 2px 10px rgba(91,75,219,.35)}
  .tb-btn.primary:hover{filter:brightness(1.08)}
  .icon-btn{width:30px;padding:0;justify-content:center;border:none}

  .toolbar-wrap{display:flex;justify-content:center;padding:10px 14px 0;position:relative;z-index:30}
  .toolbar{
    display:flex;align-items:center;gap:2px;flex-wrap:wrap;justify-content:center;
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
    border:1px solid var(--glass-border);border-radius:14px;padding:6px 8px;box-shadow:var(--shadow-soft);
  }
  .tool{
    height:30px;min-width:30px;padding:0 7px;border:none;border-radius:8px;background:transparent;
    color:var(--graphite);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;
    font-size:12.5px;font-weight:500;transition:background .12s,color .12s;
  }
  .tool svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
  .tool:hover{background:var(--btn-hover);color:var(--ink)}
  .tool.active{background:var(--btn-active);color:var(--accent-text)}
  .tool-sep{width:1px;height:20px;background:var(--hairline);margin:0 5px}
  .tool-select{
    height:30px;border:none;border-radius:8px;background:transparent;color:var(--graphite);
    font-size:12.5px;font-weight:500;padding:0 6px;cursor:pointer;outline:none;font-family:inherit;
    -webkit-appearance:none;appearance:none;
  }
  .tool-select:hover{background:var(--btn-hover);color:var(--ink)}
  .swatch-btn{flex-direction:column;gap:0;padding-top:3px}
  .swatch-bar{width:15px;height:3.5px;border-radius:2px;margin-top:1.5px}
  input[type="color"].hidden-color{position:absolute;width:0;height:0;opacity:0;pointer-events:none}
  .size-input{
    width:46px;height:28px;border:1px solid var(--hairline);border-radius:7px;background:var(--paper);
    color:var(--ink);text-align:center;font-family:inherit;font-size:12px;outline:none;
  }

  /* layout */
  .body-row{display:flex;height:calc(100vh - 52px - 48px - 36px);padding-top:10px}
  .sidebar{
    width:178px;flex-shrink:0;overflow-y:auto;padding:8px 14px 20px;display:flex;flex-direction:column;gap:12px;
  }
  .sthumb{
    position:relative;border-radius:9px;overflow:hidden;cursor:pointer;flex-shrink:0;
    box-shadow:var(--shadow-soft);outline:2px solid transparent;outline-offset:2px;
    transition:outline-color .15s,transform .15s;background:#fff;
  }
  .sthumb:hover{transform:translateY(-1px)}
  .sthumb.current{outline-color:var(--raven-a)}
  .sthumb .mini{transform-origin:top left;pointer-events:none;position:absolute;top:0;left:0}
  .sthumb .pg-num{
    position:absolute;left:6px;bottom:5px;background:rgba(13,13,18,.6);color:#fff;
    font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px;z-index:3;
  }
  .sthumb .pg-acts{position:absolute;top:5px;right:5px;display:none;gap:3px;z-index:3}
  .sthumb:hover .pg-acts{display:flex}
  .pg-act{
    width:21px;height:21px;border:none;border-radius:6px;background:rgba(13,13,18,.62);color:#fff;
    cursor:pointer;display:grid;place-items:center;
  }
  .pg-act:hover{background:var(--raven-a)}
  .pg-act svg{width:11px;height:11px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .sthumb.dragging{opacity:.4}
  .sthumb.drag-over{outline:2px dashed var(--raven-a)}
  .add-slide{
    border:1.5px dashed var(--hairline);border-radius:9px;background:transparent;color:var(--mist);
    padding:12px;cursor:pointer;font-size:12.5px;font-weight:500;flex-shrink:0;
  }
  .add-slide:hover{border-color:var(--raven-a);color:var(--accent-text)}

  .stage-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;padding:0 22px;position:relative}
  .stage-scale{position:relative;flex-shrink:0}
  .stage{
    position:relative;background:#fff;box-shadow:var(--shadow-pop);border-radius:4px;overflow:hidden;
    transform-origin:top left;
  }
  .el{position:absolute;cursor:move;outline:1.5px solid transparent;outline-offset:0}
  .el:hover{outline-color:rgba(123,92,240,.5)}
  .el.selected{outline:1.5px solid var(--raven-a)}
  .el .txt{
    width:100%;height:100%;outline:none;overflow:hidden;cursor:inherit;
    word-wrap:break-word;line-height:1.28;
  }
  .el.editing{cursor:text}
  .el.editing .txt{cursor:text;user-select:text}
  .el .shape{width:100%;height:100%;pointer-events:none}
  .el img{width:100%;height:100%;object-fit:fill;pointer-events:none;display:block}
  .handle{
    position:absolute;width:9px;height:9px;background:#fff;border:1.5px solid var(--raven-a);border-radius:50%;
    z-index:5;
  }
  .h-nw{top:-5px;left:-5px;cursor:nwse-resize}.h-n{top:-5px;left:calc(50% - 4.5px);cursor:ns-resize}
  .h-ne{top:-5px;right:-5px;cursor:nesw-resize}.h-e{top:calc(50% - 4.5px);right:-5px;cursor:ew-resize}
  .h-se{bottom:-5px;right:-5px;cursor:nwse-resize}.h-s{bottom:-5px;left:calc(50% - 4.5px);cursor:ns-resize}
  .h-sw{bottom:-5px;left:-5px;cursor:nesw-resize}.h-w{top:calc(50% - 4.5px);left:-5px;cursor:ew-resize}

  .notes-wrap{
    width:100%;max-width:920px;margin:14px auto 0;flex-shrink:0;
  }
  .notes{
    width:100%;min-height:40px;max-height:84px;resize:none;border:1px solid var(--hairline);border-radius:10px;
    background:var(--glass);backdrop-filter:blur(14px);color:var(--ink);font-family:inherit;font-size:12.5px;
    padding:9px 13px;outline:none;
  }
  .notes:focus{box-shadow:0 0 0 2px var(--raven-a);border-color:transparent}

  .statusbar{
    position:fixed;left:0;right:0;bottom:0;height:36px;display:flex;align-items:center;justify-content:space-between;
    padding:0 20px;z-index:40;font-size:12px;color:var(--mist);
    background:var(--glass);backdrop-filter:blur(24px) saturate(1.6);-webkit-backdrop-filter:blur(24px) saturate(1.6);
    border-top:1px solid var(--hairline);
  }
  .statusbar b{color:var(--ink);font-weight:600;font-variant-numeric:tabular-nums}
  .status-left,.status-right{display:flex;align-items:center;gap:18px}

  .popover{
    position:fixed;z-index:60;background:var(--glass);backdrop-filter:blur(28px) saturate(1.7);
    -webkit-backdrop-filter:blur(28px) saturate(1.7);border:1px solid var(--glass-border);
    border-radius:12px;box-shadow:var(--shadow-pop);padding:6px;min-width:190px;
    opacity:0;transform:translateY(-4px) scale(.98);pointer-events:none;transition:opacity .14s,transform .14s;
  }
  .popover.open{opacity:1;transform:none;pointer-events:auto}
  .menu-item{
    display:flex;align-items:center;gap:10px;width:100%;padding:7px 11px;border:none;border-radius:8px;
    background:transparent;color:var(--ink);font-size:13px;cursor:pointer;text-align:left;transition:background .12s;
  }
  .menu-item:hover{background:var(--btn-active);color:var(--accent-text)}
  .menu-label{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--mist);padding:7px 11px 4px}

  /* present mode */
  .present{
    position:fixed;inset:0;background:#000;z-index:100;display:none;align-items:center;justify-content:center;
  }
  .present.on{display:flex}
  .present .pstage{position:relative;background:#fff;overflow:hidden;transform-origin:center}
  .present .pnav{
    position:fixed;bottom:18px;right:22px;color:rgba(255,255,255,.6);font-size:13px;font-variant-numeric:tabular-nums;
    user-select:none;
  }

  .toast{
    position:fixed;bottom:50px;left:50%;transform:translateX(-50%) translateY(12px);z-index:120;
    background:var(--ink);color:var(--canvas);font-size:12.5px;font-weight:500;padding:9px 18px;
    border-radius:10px;box-shadow:var(--shadow-pop);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;
  }
  .toast.show{opacity:1;transform:translateX(-50%)}

  .sidebar::-webkit-scrollbar{width:9px}
  .sidebar::-webkit-scrollbar-thumb{background:rgba(13,13,18,.18);border-radius:5px}
  [data-theme="dark"] .sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.18)}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body data-theme="light">

<header class="titlebar">
  <div class="logo-text">Raven Slides <span>· Raven Suite</span></div>
  <div class="titlebar-center">
    <input class="doc-title" id="docTitle" value="Untitled presentation" spellcheck="false">
  </div>
  <div class="titlebar-actions">
    <button class="tb-btn icon-btn" id="themeBtn" title="Toggle appearance">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="tb-btn" id="openBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
      Open
    </button>
    <input type="file" id="openInput" accept=".pptx" style="display:none">
    <input type="file" id="imgInput" accept="image/*" style="display:none">
    <button class="tb-btn" id="exportBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M7 10l5 5 5-5M5 17v2a2 2 0 002 2h10a2 2 0 002-2v-2"/></svg>
      Export .pptx
    </button>
    <button class="tb-btn primary" id="presentBtn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M7 5v14l11-7z"/></svg>
      Present
    </button>
  </div>
</header>

<div class="toolbar-wrap">
  <div class="toolbar">
    <button class="tool" id="undoBtn" title="Undo (⌘Z)"><svg viewBox="0 0 24 24"><path d="M9 14H4V9"/><path d="M4 14c2.5-4.5 7-6.5 11-5 3.2 1.2 5 4 5 7"/></svg></button>
    <button class="tool" id="redoBtn" title="Redo (⇧⌘Z)"><svg viewBox="0 0 24 24"><path d="M15 14h5V9"/><path d="M20 14c-2.5-4.5-7-6.5-11-5-3.2 1.2-5 4-5 7"/></svg></button>
    <div class="tool-sep"></div>
    <button class="tool" id="addTextBtn" title="Text box"><svg viewBox="0 0 24 24"><path d="M5 6V4h14v2M12 4v16M9 20h6"/></svg></button>
    <button class="tool" id="addRectBtn" title="Rectangle"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1.5"/></svg></button>
    <button class="tool" id="addRoundBtn" title="Rounded rectangle"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="5"/></svg></button>
    <button class="tool" id="addEllipseBtn" title="Ellipse"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8.5" ry="6.5"/></svg></button>
    <button class="tool" id="addLineBtn" title="Line"><svg viewBox="0 0 24 24"><path d="M4 19L20 5"/></svg></button>
    <button class="tool" id="addImgBtn" title="Image"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="16" rx="2.5"/><circle cx="9" cy="10" r="1.6"/><path d="M21 16l-5-5-8 8"/></svg></button>
    <div class="tool-sep"></div>
    <select class="tool-select" id="fontSel" title="Font" style="width:100px">
      <option value="-apple-system,Segoe UI,Arial,sans-serif" selected>System</option>
      <option value="Arial,sans-serif">Arial</option>
      <option value="Georgia,serif">Georgia</option>
      <option value="'Times New Roman',serif">Times</option>
      <option value="'Courier New',monospace">Courier</option>
      <option value="Verdana,sans-serif">Verdana</option>
    </select>
    <input class="size-input" id="fontSize" type="number" min="6" max="200" value="18" title="Font size (pt)">
    <button class="tool" data-tcmd="bold" title="Bold"><svg viewBox="0 0 24 24" stroke-width="2.4"><path d="M7 5h6a3.5 3.5 0 010 7H7zM7 12h7a3.5 3.5 0 010 7H7z"/></svg></button>
    <button class="tool" data-tcmd="italic" title="Italic"><svg viewBox="0 0 24 24"><path d="M19 4h-9M14 20H5M15 4L9 20"/></svg></button>
    <button class="tool" data-tcmd="underline" title="Underline"><svg viewBox="0 0 24 24"><path d="M6 4v6a6 6 0 0012 0V4M4 21h16"/></svg></button>
    <button class="tool swatch-btn" id="textColorBtn" title="Text color">
      <span style="font-weight:700;font-size:13px;line-height:1">A</span>
      <span class="swatch-bar" id="textSwatch" style="background:#0d0d12"></span>
      <input type="color" class="hidden-color" id="textColorInput" value="#0d0d12">
    </button>
    <button class="tool" data-talign="left" title="Align left"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h10M4 18h14"/></svg></button>
    <button class="tool" data-talign="center" title="Align center"><svg viewBox="0 0 24 24"><path d="M4 6h16M7 12h10M5 18h14"/></svg></button>
    <button class="tool" data-talign="right" title="Align right"><svg viewBox="0 0 24 24"><path d="M4 6h16M10 12h10M6 18h14"/></svg></button>
    <button class="tool" id="bulletBtn" title="Bulleted list"><svg viewBox="0 0 24 24"><path d="M9 6h12M9 12h12M9 18h12"/><circle cx="4.5" cy="6" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="12" r="1.3" fill="currentColor" stroke="none"/><circle cx="4.5" cy="18" r="1.3" fill="currentColor" stroke="none"/></svg></button>
    <div class="tool-sep"></div>
    <button class="tool swatch-btn" id="fillBtn" title="Shape fill">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M12 3l7 7-8.5 8.5a2.1 2.1 0 01-3 0L3 14z"/><path d="M20 17s2 2.2 2 3.5a2 2 0 11-4 0c0-1.3 2-3.5 2-3.5z"/></svg>
      <span class="swatch-bar" id="fillSwatch" style="background:#7b5cf0"></span>
      <input type="color" class="hidden-color" id="fillInput" value="#7b5cf0">
    </button>
    <button class="tool swatch-btn" id="strokeBtn" title="Border color">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px"><rect x="5" y="5" width="14" height="14" rx="2"/></svg>
      <span class="swatch-bar" id="strokeSwatch" style="background:#0d0d12"></span>
      <input type="color" class="hidden-color" id="strokeInput" value="#0d0d12">
    </button>
    <button class="tool" id="noFillBtn" title="No fill">⌀</button>
    <button class="tool swatch-btn" id="bgBtn" title="Slide background">
      <svg viewBox="0 0 24 24" style="width:14px;height:14px"><rect x="3" y="4" width="18" height="16" rx="2.5"/></svg>
      <span class="swatch-bar" id="bgSwatch" style="background:#ffffff"></span>
      <input type="color" class="hidden-color" id="bgInput" value="#ffffff">
    </button>
    <div class="tool-sep"></div>
    <button class="tool" id="fwdBtn" title="Bring forward"><svg viewBox="0 0 24 24"><rect x="8" y="3" width="13" height="13" rx="2"/><path d="M3 8v11a2 2 0 002 2h11"/></svg></button>
    <button class="tool" id="backBtn" title="Send backward"><svg viewBox="0 0 24 24"><rect x="3" y="8" width="13" height="13" rx="2"/><path d="M8 3h11a2 2 0 012 2v11"/></svg></button>
    <button class="tool" id="dupBtn" title="Duplicate (⌘D)"><svg viewBox="0 0 24 24"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M16 4H6a2 2 0 00-2 2v10"/></svg></button>
    <button class="tool" id="delBtn" title="Delete element"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>
  </div>
</div>

<div class="body-row">
  <aside class="sidebar" id="sidebar"></aside>
  <main class="stage-wrap" id="stageWrap">
    <div class="stage-scale" id="stageScale">
      <div class="stage" id="stage"></div>
    </div>
    <div class="notes-wrap">
      <textarea class="notes" id="notes" placeholder="Speaker notes for this slide…"></textarea>
    </div>
  </main>
</div>

<footer class="statusbar">
  <div class="status-left">
    <span>Slide <b id="curSlide">1</b> of <b id="totSlides">1</b></span>
    <span id="selHint">Click an element to select · double-click text to edit</span>
  </div>
  <div class="status-right"><span>16:9</span><span>Raven Slides</span></div>
</footer>

<div class="popover" id="layoutMenu">
  <div class="menu-label">New slide</div>
  <button class="menu-item" data-layout="title">Title slide</button>
  <button class="menu-item" data-layout="tc">Title + content</button>
  <button class="menu-item" data-layout="two">Two content</button>
  <button class="menu-item" data-layout="section">Section header</button>
  <button class="menu-item" data-layout="blank">Blank</button>
</div>

<div class="present" id="present">
  <div class="pstage" id="pstage"></div>
  <div class="pnav" id="pnav"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  let SLIDE_W = 960, SLIDE_H = 540;

  /* ───────── model ───────── */
  let uid = 0;
  const nid = () => 'e' + (++uid);
  const mkText = (x,y,w,h,html,o={}) => ({ id:nid(), type:'text', x,y,w,h, html,
    size:o.size||18, color:o.color||'#0d0d12', align:o.align||'left', font:o.font||"-apple-system,Segoe UI,Arial,sans-serif",
    bold:!!o.bold, fill:o.fill||null, valign:o.valign||'top' });
  const mkShape = (kind,x,y,w,h,o={}) => ({ id:nid(), type:kind, x,y,w,h,
    fill:o.fill??'#7b5cf0', stroke:o.stroke??null, strokeW:o.strokeW??0, rot:o.rot||0 });
  const mkImg = (dataUrl,x,y,w,h) => ({ id:nid(), type:'image', x,y,w,h, dataUrl });

  const LAYOUTS = {
    title: () => [
      mkText(96,170,768,110,'Presentation title',{size:44,bold:true,align:'center'}),
      mkText(96,300,768,50,'Subtitle or author',{size:20,color:'#86868f',align:'center'}),
    ],
    tc: () => [
      mkText(60,40,840,70,'Slide title',{size:32,bold:true}),
      mkText(60,130,840,360,'• Click to edit content',{size:18}),
    ],
    two: () => [
      mkText(60,40,840,70,'Slide title',{size:32,bold:true}),
      mkText(60,130,408,360,'• Left content',{size:18}),
      mkText(492,130,408,360,'• Right content',{size:18}),
    ],
    section: () => [
      mkShape('rect',0,0,960,540,{fill:'#5b4bdb'}),
      mkText(80,210,800,90,'Section title',{size:40,bold:true,color:'#ffffff',align:'center'}),
    ],
    blank: () => [],
  };
  const mkSlide = (layout='tc') => ({ bg:'#ffffff', els:LAYOUTS[layout](), notes:'' });

  const DOC = { slides:[mkSlide('title')], cur:0 };
  const slide = () => DOC.slides[DOC.cur];
  let selId = null;
  const selEl = () => slide().els.find(e=>e.id===selId) || null;

  /* undo */
  const undoStack=[], redoStack=[];
  function snapshot(){
    undoStack.push(JSON.stringify(DOC));
    if (undoStack.length>80) undoStack.shift();
    redoStack.length=0;
  }
  function restore(from,to){
    if (!from.length){ toast('Nothing to '+(from===undoStack?'undo':'redo')); return; }
    commitTextEdits();
    to.push(JSON.stringify(DOC));
    const d=JSON.parse(from.pop());
    DOC.slides=d.slides; DOC.cur=Math.min(d.cur,d.slides.length-1);
    selId=null; renderAll();
  }

  /* ───────── rendering ───────── */
  const stage=$('stage'), stageScale=$('stageScale');
  function elNode(e, interactive=true){
    const d=document.createElement('div');
    d.className='el'; d.dataset.id=e.id;
    d.style.left=e.x+'px'; d.style.top=e.y+'px';
    d.style.width=e.w+'px'; d.style.height=e.h+'px';
    if (e.rot) d.style.transform='rotate('+e.rot+'deg)';
    d.style.zIndex=slide().els.indexOf(e)+1;
    if (e.type==='text'){
      const t=document.createElement('div'); t.className='txt';
      t.innerHTML=e.html;
      t.style.fontSize=e.size+'px'; t.style.color=e.color; t.style.textAlign=e.align;
      t.style.fontFamily=e.font; t.style.fontWeight=e.bold?'700':'400';
      if (e.valign==='middle'){ t.style.display='flex'; t.style.flexDirection='column'; t.style.justifyContent='center'; }
      if (e.fill) d.style.background=e.fill;
      d.appendChild(t);
    } else if (e.type==='image'){
      const im=document.createElement('img'); im.src=e.dataUrl; d.appendChild(im);
    } else {
      const svgNS='http://www.w3.org/2000/svg';
      const svg=document.createElementNS(svgNS,'svg');
      svg.setAttribute('class','shape'); svg.setAttribute('viewBox',`0 0 ${e.w} ${e.h}`);
      svg.setAttribute('preserveAspectRatio','none');
      let sh;
      if (e.type==='ellipse'){ sh=document.createElementNS(svgNS,'ellipse');
        sh.setAttribute('cx',e.w/2); sh.setAttribute('cy',e.h/2); sh.setAttribute('rx',Math.max(1,e.w/2-(e.strokeW||0))); sh.setAttribute('ry',Math.max(1,e.h/2-(e.strokeW||0))); }
      else if (e.type==='line'){ sh=document.createElementNS(svgNS,'line');
        sh.setAttribute('x1',0); sh.setAttribute('y1',e.h/2); sh.setAttribute('x2',e.w); sh.setAttribute('y2',e.h/2); }
      else { sh=document.createElementNS(svgNS,'rect');
        sh.setAttribute('x',(e.strokeW||0)/2); sh.setAttribute('y',(e.strokeW||0)/2);
        sh.setAttribute('width',Math.max(1,e.w-(e.strokeW||0))); sh.setAttribute('height',Math.max(1,e.h-(e.strokeW||0)));
        if (e.type==='roundRect') sh.setAttribute('rx',Math.min(e.w,e.h)*.16); }
      sh.setAttribute('fill', e.type==='line' ? 'none' : (e.fill||'none'));
      sh.setAttribute('stroke', e.stroke|| (e.type==='line'?'#0d0d12':'none'));
      sh.setAttribute('stroke-width', e.type==='line' ? Math.max(2,e.strokeW||2) : (e.strokeW||0));
      svg.appendChild(sh);
      d.appendChild(svg);
    }
    if (interactive) bindEl(d,e);
    return d;
  }

  function renderStage(){
    stage.innerHTML='';
    stage.style.width=SLIDE_W+'px'; stage.style.height=SLIDE_H+'px';
    stage.style.background=slide().bg;
    slide().els.forEach(e=>stage.appendChild(elNode(e)));
    if (selId) drawSelection();
    fitStage();
  }
  function fitStage(){
    const wrap=$('stageWrap');
    const availW=wrap.clientWidth-44, availH=wrap.clientHeight-140;
    const sc=Math.min(availW/SLIDE_W, availH/SLIDE_H, 1.4);
    stage.style.transform='scale('+sc+')';
    stageScale.style.width=(SLIDE_W*sc)+'px';
    stageScale.style.height=(SLIDE_H*sc)+'px';
    stage.dataset.scale=sc;
  }
  addEventListener('resize',fitStage);

  function renderSidebar(){
    const sb=$('sidebar'); sb.innerHTML='';
    const tw=148, sc=tw/SLIDE_W, th=SLIDE_H*sc;
    DOC.slides.forEach((s,i)=>{
      const t=document.createElement('div');
      t.className='sthumb'+(i===DOC.cur?' current':'');
      t.style.width=tw+'px'; t.style.height=th+'px'; t.draggable=true;
      const mini=document.createElement('div');
      mini.className='mini'; mini.style.width=SLIDE_W+'px'; mini.style.height=SLIDE_H+'px';
      mini.style.transform='scale('+sc+')'; mini.style.background=s.bg;
      const hold=DOC.cur; DOC.cur=i;
      s.els.forEach(e=>mini.appendChild(elNode(e,false)));
      DOC.cur=hold;
      t.appendChild(mini);
      const num=document.createElement('div'); num.className='pg-num'; num.textContent=i+1; t.appendChild(num);
      const acts=document.createElement('div'); acts.className='pg-acts';
      acts.innerHTML=`
        <button class="pg-act" data-act="dup" title="Duplicate"><svg viewBox="0 0 24 24"><rect x="8" y="8" width="13" height="13" rx="2"/><path d="M16 4H6a2 2 0 00-2 2v10"/></svg></button>
        <button class="pg-act" data-act="del" title="Delete"><svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5h6v2M7 7l1 13h8l1-13"/></svg></button>`;
      t.appendChild(acts);
      t.addEventListener('click',e=>{
        if (e.target.closest('.pg-act')) return;
        commitTextEdits(); DOC.cur=i; selId=null; renderAll();
      });
      acts.querySelector('[data-act="dup"]').onclick=()=>{
        snapshot();
        const copy=JSON.parse(JSON.stringify(DOC.slides[i]));
        copy.els.forEach(e=>e.id=nid());
        DOC.slides.splice(i+1,0,copy); DOC.cur=i+1; selId=null; renderAll();
      };
      acts.querySelector('[data-act="del"]').onclick=()=>{
        if (DOC.slides.length===1){ toast('Presentation needs at least one slide'); return; }
        snapshot();
        DOC.slides.splice(i,1); DOC.cur=Math.min(DOC.cur,DOC.slides.length-1);
        selId=null; renderAll();
      };
      t.addEventListener('dragstart',()=>{DOC._drag=i; t.classList.add('dragging');});
      t.addEventListener('dragend',()=>t.classList.remove('dragging'));
      t.addEventListener('dragover',e=>{e.preventDefault();t.classList.add('drag-over');});
      t.addEventListener('dragleave',()=>t.classList.remove('drag-over'));
      t.addEventListener('drop',e=>{
        e.preventDefault(); t.classList.remove('drag-over');
        const from=DOC._drag; if (from==null||from===i) return;
        snapshot();
        const [m]=DOC.slides.splice(from,1);
        DOC.slides.splice(i,0,m); DOC.cur=i; renderAll();
      });
      sb.appendChild(t);
    });
    const add=document.createElement('button');
    add.className='add-slide'; add.textContent='+ New slide';
    add.onclick=e=>{e.stopPropagation();showPop($('layoutMenu'),add);};
    sb.appendChild(add);
  }

  function renderAll(){
    renderStage(); renderSidebar();
    $('curSlide').textContent=DOC.cur+1;
    $('totSlides').textContent=DOC.slides.length;
    $('notes').value=slide().notes||'';
    $('bgSwatch').style.background=slide().bg;
  }

  /* ───────── selection / drag / resize ───────── */
  function drawSelection(){
    stage.querySelectorAll('.el').forEach(n=>{
      const sel=n.dataset.id===selId;
      n.classList.toggle('selected',sel);
      n.querySelectorAll('.handle').forEach(h=>h.remove());
      if (sel && !n.classList.contains('editing')){
        ['nw','n','ne','e','se','s','sw','w'].forEach(p=>{
          const h=document.createElement('div'); h.className='handle h-'+p; h.dataset.h=p;
          n.appendChild(h);
        });
      }
    });
    syncToolbar();
  }
  function select(id){ commitTextEdits(); selId=id; drawSelection(); }

  const scale=()=>+stage.dataset.scale||1;
  function bindEl(node,e){
    node.addEventListener('pointerdown', ev=>{
      if (ev.target.classList.contains('handle')){ startResize(ev,node,e); return; }
      if (node.classList.contains('editing')) return;
      ev.preventDefault();
      if (selId!==e.id) select(e.id);
      startDrag(ev,node,e);
    });
    node.addEventListener('dblclick', ()=>{
      if (e.type!=='text') return;
      select(e.id);
      node.classList.add('editing');
      const t=node.querySelector('.txt');
      t.contentEditable=true; t.focus();
      document.execCommand('selectAll',false,null);
      node.querySelectorAll('.handle').forEach(h=>h.remove());
    });
  }
  function commitTextEdits(){
    stage.querySelectorAll('.el.editing').forEach(n=>{
      const e=slide().els.find(x=>x.id===n.dataset.id);
      const t=n.querySelector('.txt');
      if (e&&t){ e.html=t.innerHTML; }
      t.contentEditable=false;
      n.classList.remove('editing');
    });
  }
  stage.addEventListener('pointerdown',e=>{
    if (e.target===stage){ commitTextEdits(); selId=null; drawSelection(); }
  });

  function startDrag(ev,node,e){
    const sx=ev.clientX, sy=ev.clientY, ox=e.x, oy=e.y;
    let moved=false;
    const move=m=>{
      const dx=(m.clientX-sx)/scale(), dy=(m.clientY-sy)/scale();
      if (!moved && Math.hypot(dx,dy)>2){ moved=true; snapshot(); }
      if (!moved) return;
      e.x=Math.round(ox+dx); e.y=Math.round(oy+dy);
      node.style.left=e.x+'px'; node.style.top=e.y+'px';
    };
    const up=()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); if (moved) renderSidebar(); };
    addEventListener('pointermove',move); addEventListener('pointerup',up);
  }
  function startResize(ev,node,e){
    ev.preventDefault(); ev.stopPropagation();
    snapshot();
    const p=ev.target.dataset.h;
    const sx=ev.clientX, sy=ev.clientY, o={x:e.x,y:e.y,w:e.w,h:e.h};
    const move=m=>{
      const dx=(m.clientX-sx)/scale(), dy=(m.clientY-sy)/scale();
      if (p.includes('e')) e.w=Math.max(20,Math.round(o.w+dx));
      if (p.includes('s')) e.h=Math.max(14,Math.round(o.h+dy));
      if (p.includes('w')){ e.w=Math.max(20,Math.round(o.w-dx)); e.x=Math.round(o.x+o.w-e.w); }
      if (p.includes('n')){ e.h=Math.max(14,Math.round(o.h-dy)); e.y=Math.round(o.y+o.h-e.h); }
      node.style.left=e.x+'px'; node.style.top=e.y+'px';
      node.style.width=e.w+'px'; node.style.height=e.h+'px';
      const svg=node.querySelector('svg.shape');
      if (svg){ node.replaceChild(elNode(e).querySelector('svg.shape'),svg); }
    };
    const up=()=>{ removeEventListener('pointermove',move); removeEventListener('pointerup',up); renderStage(); renderSidebar(); drawSelection(); };
    addEventListener('pointermove',move); addEventListener('pointerup',up);
  }

  /* ───────── toolbar actions ───────── */
  function addEl(e){
    snapshot();
    slide().els.push(e);
    renderStage(); renderSidebar(); select(e.id);
  }
  $('addTextBtn').onclick=()=>addEl(mkText(330,230,300,60,'New text'));
  $('addRectBtn').onclick=()=>addEl(mkShape('rect',380,210,200,120));
  $('addRoundBtn').onclick=()=>addEl(mkShape('roundRect',380,210,200,120));
  $('addEllipseBtn').onclick=()=>addEl(mkShape('ellipse',380,210,200,140));
  $('addLineBtn').onclick=()=>addEl(mkShape('line',330,265,300,10,{stroke:'#0d0d12',strokeW:3,fill:null}));
  $('addImgBtn').onclick=()=>$('imgInput').click();
  $('imgInput').addEventListener('change',e=>{
    const f=e.target.files[0]; e.target.value='';
    if (!f) return;
    const rd=new FileReader();
    rd.onload=()=>{
      const im=new Image();
      im.onload=()=>{
        const maxW=420, w=Math.min(maxW,im.width), h=w*im.height/im.width;
        addEl(mkImg(rd.result,(SLIDE_W-w)/2,(SLIDE_H-h)/2,Math.round(w),Math.round(h)));
      };
      im.src=rd.result;
    };
    rd.readAsDataURL(f);
  });

  function editingNode(){ return stage.querySelector('.el.editing .txt'); }
  function withSel(fn){ const e=selEl(); if (!e){ toast('Select an element first'); return; } snapshot(); fn(e); renderStage(); renderSidebar(); drawSelection(); }

  document.querySelectorAll('[data-tcmd]').forEach(b=>b.onclick=()=>{
    const t=editingNode();
    if (t){ document.execCommand(b.dataset.tcmd); return; }
    withSel(e=>{ if (e.type==='text'&&b.dataset.tcmd==='bold') e.bold=!e.bold;
      else if (e.type==='text') e.html=`<${b.dataset.tcmd[0]}>` + e.html + `</${b.dataset.tcmd[0]}>`; });
  });
  document.querySelectorAll('[data-talign]').forEach(b=>b.onclick=()=>withSel(e=>{ if (e.type==='text') e.align=b.dataset.talign; }));
  $('bulletBtn').onclick=()=>{
    const t=editingNode();
    if (t){ document.execCommand('insertUnorderedList'); return; }
    withSel(e=>{ if (e.type==='text') e.html='<ul><li>'+e.html.replace(/<br\s*\/?>/g,'</li><li>')+'</li></ul>'; });
  };
  $('fontSize').addEventListener('change',e=>withSel(el=>{ if (el.type==='text') el.size=+e.target.value||18; }));
  $('fontSel').addEventListener('change',e=>withSel(el=>{ if (el.type==='text') el.font=e.target.value; }));
  const wireColor=(btn,inp,sw,fn)=>{
    $(btn).onclick=()=>$(inp).click();
    $(inp).addEventListener('input',e=>{ $(sw).style.background=e.target.value; fn(e.target.value); });
  };
  wireColor('textColorBtn','textColorInput','textSwatch',v=>{
    const t=editingNode();
    if (t){ document.execCommand('foreColor',false,v); return; }
    withSel(e=>{ if (e.type==='text') e.color=v; });
  });
  wireColor('fillBtn','fillInput','fillSwatch',v=>withSel(e=>{ if (e.type==='text') e.fill=v; else e.fill=v; }));
  wireColor('strokeBtn','strokeInput','strokeSwatch',v=>withSel(e=>{ e.stroke=v; if (!e.strokeW) e.strokeW=2; }));
  $('noFillBtn').onclick=()=>withSel(e=>{ e.fill=null; });
  wireColor('bgBtn','bgInput','bgSwatch',v=>{ snapshot(); slide().bg=v; renderStage(); renderSidebar(); });

  $('fwdBtn').onclick=()=>withSel(e=>{ const a=slide().els, i=a.indexOf(e); if (i<a.length-1){ a.splice(i,1); a.splice(i+1,0,e);} });
  $('backBtn').onclick=()=>withSel(e=>{ const a=slide().els, i=a.indexOf(e); if (i>0){ a.splice(i,1); a.splice(i-1,0,e);} });
  $('dupBtn').onclick=()=>withSel(e=>{ const c=JSON.parse(JSON.stringify(e)); c.id=nid(); c.x+=22; c.y+=22; slide().els.push(c); selId=c.id; });
  $('delBtn').onclick=()=>withSel(e=>{ slide().els=slide().els.filter(x=>x!==e); selId=null; });

  function syncToolbar(){
    const e=selEl();
    if (e&&e.type==='text'){ $('fontSize').value=e.size; }
  }

  $('notes').addEventListener('input',e=>{ slide().notes=e.target.value; });

  /* layout menu */
  let openPop=null;
  function showPop(pop,anchor){
    closePop();
    const r=anchor.getBoundingClientRect();
    pop.style.left=Math.min(r.left,innerWidth-pop.offsetWidth-12)+'px';
    pop.style.top=Math.min(r.bottom+8, innerHeight-pop.offsetHeight-12)+'px';
    pop.classList.add('open'); openPop=pop;
  }
  function closePop(){ if (openPop){openPop.classList.remove('open');openPop=null;} }
  document.addEventListener('mousedown',e=>{ if (openPop&&!openPop.contains(e.target)) closePop(); });
  document.querySelectorAll('[data-layout]').forEach(b=>b.onclick=()=>{
    closePop(); snapshot();
    DOC.slides.splice(DOC.cur+1,0,mkSlide(b.dataset.layout));
    DOC.cur++; selId=null; renderAll();
  });

  /* ───────── keyboard ───────── */
  document.addEventListener('keydown',e=>{
    const typing=editingNode()||['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);
    const mod=e.metaKey||e.ctrlKey;
    if (mod&&e.key.toLowerCase()==='z'&&!typing){ e.preventDefault(); e.shiftKey?restore(redoStack,undoStack):restore(undoStack,redoStack); return; }
    if (mod&&e.key.toLowerCase()==='d'&&!typing&&selEl()){ e.preventDefault(); $('dupBtn').click(); return; }
    if (mod&&e.key.toLowerCase()==='s'){ e.preventDefault(); exportPptx(); return; }
    if (typing){ if (e.key==='Escape'){ commitTextEdits(); drawSelection(); } return; }
    if (e.key==='F5'){ e.preventDefault(); startPresent(); return; }
    if ((e.key==='Delete'||e.key==='Backspace')&&selEl()){ e.preventDefault(); $('delBtn').click(); return; }
    if (e.key==='Escape'){ selId=null; drawSelection(); return; }
    const e2=selEl();
    if (e2&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
      e.preventDefault();
      const d=e.shiftKey?10:1;
      if (e.key==='ArrowUp')e2.y-=d; if (e.key==='ArrowDown')e2.y+=d;
      if (e.key==='ArrowLeft')e2.x-=d; if (e.key==='ArrowRight')e2.x+=d;
      renderStage(); drawSelection();
      return;
    }
    if (!selEl()&&!typing){
      if (e.key==='PageDown'||e.key==='ArrowRight'){ if (DOC.cur<DOC.slides.length-1){DOC.cur++;selId=null;renderAll();} }
      if (e.key==='PageUp'||e.key==='ArrowLeft'){ if (DOC.cur>0){DOC.cur--;selId=null;renderAll();} }
    }
  });

  /* ───────── present mode ───────── */
  let pIdx=0;
  function startPresent(){
    commitTextEdits();
    pIdx=DOC.cur;
    $('present').classList.add('on');
    document.documentElement.requestFullscreen?.().catch(()=>{});
    renderPresent();
  }
  function renderPresent(){
    const ps=$('pstage');
    const sc=Math.min(innerWidth/SLIDE_W, innerHeight/SLIDE_H);
    ps.style.width=SLIDE_W+'px'; ps.style.height=SLIDE_H+'px';
    ps.style.transform='scale('+sc+')';
    const s=DOC.slides[pIdx];
    ps.innerHTML=''; ps.style.background=s.bg;
    const hold=DOC.cur; DOC.cur=pIdx;
    s.els.forEach(e=>ps.appendChild(elNode(e,false)));
    DOC.cur=hold;
    $('pnav').textContent=(pIdx+1)+' / '+DOC.slides.length;
  }
  function endPresent(){
    $('present').classList.remove('on');
    document.exitFullscreen?.().catch(()=>{});
  }
  $('presentBtn').onclick=startPresent;
  $('present').addEventListener('click',()=>{ if (pIdx<DOC.slides.length-1){pIdx++;renderPresent();} else endPresent(); });
  document.addEventListener('keydown',e=>{
    if (!$('present').classList.contains('on')) return;
    if (['ArrowRight','ArrowDown',' ','PageDown','Enter'].includes(e.key)){ e.preventDefault(); if (pIdx<DOC.slides.length-1){pIdx++;renderPresent();} else endPresent(); }
    if (['ArrowLeft','ArrowUp','PageUp'].includes(e.key)){ e.preventDefault(); if (pIdx>0){pIdx--;renderPresent();} }
    if (e.key==='Escape') endPresent();
  });
  addEventListener('resize',()=>{ if ($('present').classList.contains('on')) renderPresent(); });

  /* ───────── pptx export ───────── */
  const PX2IN = 1/72; // canvas px == pt
  function htmlToRuns(html, base){
    const tmp=document.createElement('div'); tmp.innerHTML=html;
    const runs=[];
    const walk=(node,st)=>{
      if (node.nodeType===3){
        const text=node.textContent;
        if (text) runs.push({ text, options:{ bold:st.b||undefined, italic:st.i||undefined, underline:st.u?{style:'sng'}:undefined,
          color:(st.color||base.color).replace('#',''), fontSize:st.size||base.size, bullet:st.bullet||undefined } });
        return;
      }
      if (node.nodeType!==1) return;
      const tag=node.tagName;
      const ns={...st};
      if (tag==='B'||tag==='STRONG') ns.b=true;
      if (tag==='I'||tag==='EM') ns.i=true;
      if (tag==='U') ns.u=true;
      if (tag==='LI') ns.bullet=true;
      const cs=node.style;
      if (cs&&cs.color) ns.color=rgb2hex(cs.color);
      if (node.getAttribute&&node.getAttribute('color')) ns.color=node.getAttribute('color');
      if (cs&&cs.fontSize){ const m=parseFloat(cs.fontSize); if (m) ns.size=m; }
      const isBlock=['DIV','P','LI','UL','OL','BR'].includes(tag);
      if (tag==='BR'){ if (runs.length) runs[runs.length-1].options.breakLine=true; else runs.push({text:'',options:{breakLine:true}}); return; }
      node.childNodes.forEach(c=>walk(c,ns));
      if (isBlock&&tag!=='UL'&&tag!=='OL'&&runs.length) runs[runs.length-1].options.breakLine=true;
    };
    walk(tmp,{});
    if (!runs.length) runs.push({text:tmp.textContent||' ',options:{color:base.color.replace('#',''),fontSize:base.size}});
    return runs;
  }
  const rgb2hex=c=>{
    if (!c) return '0d0d12';
    if (c.startsWith('#')) return c.replace('#','');
    const m=c.match(/\d+/g);
    return m? m.slice(0,3).map(n=>(+n).toString(16).padStart(2,'0')).join('') : '0d0d12';
  };

  function exportPptx(){
    try{
      commitTextEdits();
      const pptx=new PptxGenJS();
      pptx.defineLayout({ name:'RS', width:SLIDE_W*PX2IN, height:SLIDE_H*PX2IN });
      pptx.layout='RS';
      DOC.slides.forEach(s=>{
        const sl=pptx.addSlide();
        sl.background={ color: s.bg.replace('#','') };
        if (s.notes) sl.addNotes(s.notes);
        s.els.forEach(e=>{
          const pos={ x:e.x*PX2IN, y:e.y*PX2IN, w:e.w*PX2IN, h:e.h*PX2IN };
          if (e.type==='text'){
            sl.addText(htmlToRuns(e.html,{color:e.color,size:e.size}), {...pos,
              align:e.align, fontFace:e.font.split(',')[0].replace(/['"]/g,''),
              bold:e.bold||undefined, valign:e.valign==='middle'?'middle':'top',
              fill:e.fill?{color:e.fill.replace('#','')}:undefined, margin:2 });
          } else if (e.type==='image'){
            sl.addImage({ data:e.dataUrl, ...pos });
          } else if (e.type==='line'){
            sl.addShape(pptx.ShapeType.line, { x:pos.x, y:pos.y+pos.h/2, w:pos.w, h:0,
              line:{ color:(e.stroke||'#0d0d12').replace('#',''), width:Math.max(1,e.strokeW||2) } });
          } else {
            const map={ rect:pptx.ShapeType.rect, roundRect:pptx.ShapeType.roundRect, ellipse:pptx.ShapeType.ellipse };
            sl.addShape(map[e.type]||pptx.ShapeType.rect, {...pos,
              fill:e.fill?{color:e.fill.replace('#','')}:{ type:'none' },
              line:e.stroke?{color:e.stroke.replace('#',''),width:e.strokeW||1}:{ type:'none' },
              rectRadius:e.type==='roundRect'? Math.min(e.w,e.h)*.16*PX2IN : undefined });
          }
        });
      });
      pptx.writeFile({ fileName:($('docTitle').value.trim()||'presentation')+'.pptx' });
      toast('Exported presentation');
    }catch(err){ console.error(err); toast('Export failed — see console'); }
  }
  $('exportBtn').onclick=exportPptx;

  /* ───────── pptx import ───────── */
  $('openBtn').onclick=()=>$('openInput').click();
  $('openInput').addEventListener('change',async e=>{
    const f=e.target.files[0]; e.target.value='';
    if (!f) return;
    try{
      toast('Opening…');
      await importPptx(f);
      $('docTitle').value=f.name.replace(/\.pptx$/i,'');
      toast('Opened '+f.name);
    }catch(err){ console.error(err); toast('Couldn\u2019t open that file'); }
  });

  const EMU=12700; // EMU per pt
  async function importPptx(file){
    const zip=await JSZip.loadAsync(file);
    const parser=new DOMParser();
    const xml=async p=>{ const t=await zip.file(p)?.async('string'); return t? parser.parseFromString(t,'application/xml') : null; };
    const q=(node,sel)=>node? [...node.getElementsByTagName(sel)] : [];
    const q1=(node,sel)=>node? node.getElementsByTagName(sel)[0] : null;

    // slide size
    const pres=await xml('ppt/presentation.xml');
    const sldSz=q1(pres,'p:sldSz');
    let cx=12192000, cy=6858000;
    if (sldSz){ cx=+sldSz.getAttribute('cx'); cy=+sldSz.getAttribute('cy'); }
    SLIDE_W=960;
    SLIDE_H=Math.round(960*cy/cx);
    const sc=SLIDE_W/(cx/EMU); // canvas px per pt

    // slide order via rels
    const presRels=await xml('ppt/_rels/presentation.xml.rels');
    const relMap={};
    q(presRels,'Relationship').forEach(r=>relMap[r.getAttribute('Id')]=r.getAttribute('Target'));
    const slidePaths=q(pres,'p:sldId').map(s=>{
      let t=relMap[s.getAttribute('r:id')]||'';
      return 'ppt/'+t.replace(/^\.?\//,'').replace(/^\.\.\//,'');
    }).filter(p=>p.includes('slides/'));

    const newSlides=[];
    for (const path of slidePaths){
      const sx=await xml(path);
      if (!sx) continue;
      const relPath=path.replace('slides/','slides/_rels/')+'.rels';
      const rels=await xml(relPath);
      const rmap={};
      q(rels,'Relationship').forEach(r=>rmap[r.getAttribute('Id')]=r.getAttribute('Target'));

      const s={ bg:'#ffffff', els:[], notes:'' };
      // background
      const bgFill=q1(q1(sx,'p:bg'),'a:srgbClr');
      if (bgFill) s.bg='#'+bgFill.getAttribute('val');

      const tree=q1(sx,'p:spTree');
      if (!tree) { newSlides.push(s); continue; }
      let autoY=40;

      for (const node of [...tree.children]){
        const tag=node.tagName;
        const getXfrm=n=>{
          const x=q1(n,'a:off'), e2=q1(n,'a:ext');
          if (!x||!e2) return null;
          return { x:+x.getAttribute('x')/EMU*sc, y:+x.getAttribute('y')/EMU*sc,
                   w:+e2.getAttribute('cx')/EMU*sc, h:+e2.getAttribute('cy')/EMU*sc };
        };
        if (tag==='p:sp'){
          const xf=getXfrm(node);
          const txBody=q1(node,'p:txBody');
          const prst=q1(node,'a:prstGeom')?.getAttribute('prst')||'rect';
          const fillClr=(()=>{
            const spPr=q1(node,'p:spPr');
            const sf=q1(spPr,'a:solidFill');
            const c=q1(sf,'a:srgbClr');
            return c? '#'+c.getAttribute('val') : null;
          })();
          const lnClr=(()=>{
            const ln=q1(q1(node,'p:spPr'),'a:ln');
            const c=q1(q1(ln,'a:solidFill'),'a:srgbClr');
            return c? {color:'#'+c.getAttribute('val'), w:(+(ln?.getAttribute('w'))||12700)/EMU*sc} : null;
          })();
          const hasText = txBody && q(txBody,'a:t').some(t=>t.textContent.trim());
          if (hasText){
            // build html from paragraphs
            const paras=q(txBody,'a:p');
            let html='', firstSize=null, firstColor=null, firstBold=false, align='left';
            paras.forEach(p=>{
              const algn=q1(p,'a:pPr')?.getAttribute('algn');
              if (algn==='ctr') align='center'; else if (algn==='r') align='right';
              const isBullet=!q1(p,'a:buNone') && q1(p,'a:pPr')?.getAttribute('lvl')!=null;
              let line='';
              q(p,'a:r').forEach(r=>{
                const t=q1(r,'a:t')?.textContent||'';
                const rPr=q1(r,'a:rPr');
                const sz=rPr? (+rPr.getAttribute('sz')||null) : null;
                const b=rPr?.getAttribute('b')==='1';
                const u=rPr?.getAttribute('u')&&rPr.getAttribute('u')!=='none';
                const it=rPr?.getAttribute('i')==='1';
                const clr=q1(q1(rPr,'a:solidFill'),'a:srgbClr');
                if (firstSize==null&&sz) firstSize=sz/100*sc;
                if (!firstColor&&clr) firstColor='#'+clr.getAttribute('val');
                if (b) firstBold=true;
                let span=esc(t);
                if (b) span='<b>'+span+'</b>';
                if (it) span='<i>'+span+'</i>';
                if (u) span='<u>'+span+'</u>';
                if (clr) span='<span style="color:#'+clr.getAttribute('val')+'">'+span+'</span>';
                line+=span;
              });
              html+= '<div>'+(line||'<br>')+'</div>';
            });
            const ph=q1(node,'p:ph')?.getAttribute('type');
            const pos=xf|| (ph==='title'||ph==='ctrTitle'
              ? {x:50,y:30,w:SLIDE_W-100,h:80}
              : {x:50,y:autoY+=130,w:SLIDE_W-100,h:Math.min(300,SLIDE_H-autoY-40)});
            const el=mkText(Math.round(pos.x),Math.round(pos.y),Math.round(pos.w),Math.round(pos.h),html,{
              size:Math.round(firstSize|| (ph==='title'||ph==='ctrTitle'?32:18)),
              color:firstColor||'#0d0d12', align, bold:firstBold&&(ph==='title'||ph==='ctrTitle'),
              fill:fillClr });
            s.els.push(el);
          } else if (xf){
            const kindMap={ rect:'rect', roundRect:'roundRect', ellipse:'ellipse', line:'line', straightConnector1:'line' };
            s.els.push(mkShape(kindMap[prst]||'rect', Math.round(xf.x),Math.round(xf.y),Math.max(4,Math.round(xf.w)),Math.max(4,Math.round(xf.h)),
              { fill:fillClr, stroke:lnClr?.color||null, strokeW:lnClr? Math.max(1,Math.round(lnClr.w)) : 0 }));
          }
        }
        else if (tag==='p:pic'){
          const xf=getXfrm(node);
          const embed=q1(node,'a:blip')?.getAttribute('r:embed');
          if (!xf||!embed||!rmap[embed]) continue;
          let target=rmap[embed].replace(/^\.\.\//,'ppt/').replace(/^\.?\//,'');
          if (!target.startsWith('ppt/')) target='ppt/'+target;
          const imgFile=zip.file(target);
          if (!imgFile) continue;
          const b64=await imgFile.async('base64');
          const ext=target.split('.').pop().toLowerCase();
          const mime= ext==='png'?'image/png': ext==='gif'?'image/gif': ext==='svg'?'image/svg+xml':'image/jpeg';
          s.els.push(mkImg('data:'+mime+';base64,'+b64, Math.round(xf.x),Math.round(xf.y),Math.round(xf.w),Math.round(xf.h)));
        }
        else if (tag==='p:cxnSp'){
          const xf=getXfrm(node);
          if (xf) s.els.push(mkShape('line',Math.round(xf.x),Math.round(xf.y),Math.max(4,Math.round(xf.w)),Math.max(4,Math.round(xf.h)),{stroke:'#0d0d12',strokeW:2,fill:null}));
        }
      }
      // notes — resolve through this slide's own relationships
      const notesRel=Object.values(rmap).find(t=>t.includes('notesSlide'));
      if (notesRel){
        let np=notesRel.replace(/^\.\.\//,'ppt/').replace(/^\.?\//,'');
        if (!np.startsWith('ppt/')) np='ppt/'+np;
        const nx=await xml(np);
        if (nx) s.notes=q(nx,'a:t').map(t=>t.textContent).join(' ').trim();
      }
      newSlides.push(s);
    }
    if (!newSlides.length) throw new Error('no slides');
    snapshot();
    DOC.slides=newSlides; DOC.cur=0; selId=null;
    renderAll();
  }
  const esc=s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  /* misc */
  $('undoBtn').onclick=()=>restore(undoStack,redoStack);
  $('redoBtn').onclick=()=>restore(redoStack,undoStack);
  $('themeBtn').onclick=()=>{ document.body.dataset.theme=document.body.dataset.theme==='light'?'dark':'light'; };
  let toastTimer;
  function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('show');
    clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400); }

  renderAll();
  setTimeout(fitStage,50);
})();
</script>
</body>
