      +(frames.length? frames.map(f=>`<div class="proto-screen">▸ ${esc(f.name)}</div>`).join("") : `<div class="phint">No frames yet — press <b>F</b> and draw one.</div>`)
      +`</div>`;
    return;
  }
  const n=ids[0]; const r=(n.reactions && n.reactions[0])||null;
  const others=frames.filter(f=>f.id!==n.id);
  const opts=others.map(f=>`<option value="${f.id}" ${r&&r.target===f.id?"selected":""}>${esc(f.name)}</option>`).join("");
  const navOn = r && r.action==="navigate";
  c.innerHTML=`<div class="sect"><div class="field-label">Interaction</div>
    <div class="prow"><span>On</span><select id="ptrig"><option value="click" selected>Click / Tap</option></select></div>
    <div class="prow"><span>Action</span><select id="paction">
      <option value="none" ${!navOn?"selected":""}>None</option>
      <option value="navigate" ${navOn?"selected":""}>Navigate to…</option></select></div>
    <div class="prow" id="ptargetRow" style="${navOn?"":"display:none"}"><span>To</span><select id="ptarget">${opts||'<option value="">No other frames</option>'}</select></div>
    <div class="prow" id="ptransRow" style="${navOn?"":"display:none"}"><span>Animate</span><select id="ptrans">
      <option value="instant">Instant</option><option value="dissolve">Dissolve</option></select></div></div>
    <div class="sect"><div class="phint">Draw your screens as top-level frames, link them with click → navigate, then <b>Present</b> or <b>Export prototype</b>.</div></div>`;
  if(navOn && r.transition) $("ptrans").value=r.transition;
  $("paction").onchange=e=>{
    const v=e.target.value;
    $("ptargetRow").style.display = v==="navigate"?"":"none";
    $("ptransRow").style.display = v==="navigate"?"":"none";
    applyReaction(n);
  };
  if($("ptarget")) $("ptarget").onchange=()=>applyReaction(n);
  if($("ptrans")) $("ptrans").onchange=()=>applyReaction(n);
}
function applyReaction(n){

/* ════════════════ PRESENT MODE ════════════════ */
let PRES={screens:[], idx:0};
function reactedNodes(){ return Object.values(page().nodes).filter(n=>n.reactions && n.reactions[0] && n.reactions[0].action==="navigate" && n.reactions[0].target); }
function topFrameOf(n){ let cur=n, guard=0; while(cur && cur.parent && guard++<200){ cur=N(cur.parent); } return cur?cur.id:null; }
function buildScreenSVG(fr){
  const defs=[]; const body=nodeSVG(fr,defs);
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${fr.w}" height="${fr.h}" viewBox="${fr.x} ${fr.y} ${fr.w} ${fr.h}"><defs>${defs.join("")}</defs>${body}</svg>`;
}
function enterPresent(){
  const frames=page().roots.map(N).filter(n=>n && n.type==="frame");
  if(!frames.length){ toast("Draw a frame (F) to present"); return; }
  PRES.screens=frames; PRES.idx=0;
  $("present").classList.add("on");
  showScreen(0);
}
function exitPresent(){ $("present").classList.remove("on"); $("screenHost").innerHTML=""; }
function showScreen(i){
  if(i<0||i>=PRES.screens.length) return;
  PRES.idx=i; const fr=PRES.screens[i]; if(!fr) return;
  $("presentTitle").textContent=(fr.name||("Screen "+(i+1)))+"   ·   "+(i+1)+"/"+PRES.screens.length;
  const host=$("screenHost");
  const availW=window.innerWidth-60, availH=window.innerHeight-90;
  const sc=Math.min(availW/fr.w, availH/fr.h, 1);
  host.style.width=Math.round(fr.w*sc)+"px"; host.style.height=Math.round(fr.h*sc)+"px";
  let spots="";
  reactedNodes().forEach(n=>{ if(topFrameOf(n)!==fr.id) return; const a=nodeAABB(n); const r=n.reactions[0];
    spots+=`<div class="hotspot" data-target="${r.target}" style="left:${(a.x-fr.x)}px;top:${(a.y-fr.y)}px;width:${a.w}px;height:${a.h}px"></div>`; });
  host.innerHTML=`<div class="screen-wrap" style="width:${fr.w}px;height:${fr.h}px;transform:scale(${sc})">${buildScreenSVG(fr)}<div style="position:absolute;inset:0">${spots}</div></div>`;
  host.querySelectorAll(".hotspot").forEach(h=>h.onclick=()=>{ const idx=PRES.screens.findIndex(s=>s.id===h.dataset.target); if(idx>=0){ host.style.opacity="0"; setTimeout(()=>{ host.style.transition="opacity .12s"; host.style.opacity="1"; showScreen(idx); },80);} });
}

/* ════════════════ EXPORT: SVG / PNG / PROTOTYPE ════════════════ */
function contentBounds(){ const ids=page().roots.filter(id=>N(id)); if(!ids.length) return {x:0,y:0,w:200,h:200}; return selectionAABB(ids)||{x:0,y:0,w:200,h:200}; }
function standaloneSVG(pad){ pad=pad||0; const {defs,body}=buildPageSVG(); const b=contentBounds();
  return `<svg xmlns="http://www.w3.org/2000/svg" width="${Math.max(1,Math.round(b.w+pad*2))}" height="${Math.max(1,Math.round(b.h+pad*2))}" viewBox="${(b.x-pad)} ${(b.y-pad)} ${(b.w+pad*2)} ${(b.h+pad*2)}"><defs>${defs}</defs>${body}</svg>`; }
function exportSVG(){ download(standaloneSVG(0), (DOC.name||"design")+".svg", "image/svg+xml"); toast("Exported SVG"); }

/* ── per-selection export: PNG / JPG / SVG / PDF ── */
function selectionSVG(ids){
  const nodes=ids.map(N).filter(Boolean);
  if(!nodes.length) return null;
  const zsorted=[...nodes].sort((a,b)=>{ // keep page z-order (document order)
    const order=n=>{ let path=[],cur=n,g=0; while(cur&&g++<100){ path.unshift(listOf(cur).indexOf(cur.id)); cur=cur.parent?N(cur.parent):null; } return path; };
    const A=order(a),B=order(b);
    for(let i=0;i<Math.max(A.length,B.length);i++){ const d=(A[i]??-1)-(B[i]??-1); if(d) return d; }
    return 0;
  });
  const b=selectionAABB(ids); if(!b) return null;
  const defs=[]; const body=zsorted.map(n=>nodeSVG(n,defs)).join("");
  const w=Math.max(1,Math.round(b.w)), hh=Math.max(1,Math.round(b.h));
  return {svg:`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${hh}" viewBox="${b.x} ${b.y} ${b.w} ${b.h}"><defs>${defs.join("")}</defs>${body}</svg>`, b};
}
function exportName(ids){
  const nodes=ids.map(N).filter(Boolean);
  const base = nodes.length===1 ? (nodes[0].name||nodes[0].type) : (DOC.name||"design")+"-selection";
  return base.replace(/[^\w\-. ]+/g,"").trim().replace(/\s+/g,"-")||"layer";
}
function rasterizeSelection(ids, scale, jpg){
  return new Promise((resolve,reject)=>{
    const out=selectionSVG(ids); if(!out){ reject(new Error("empty")); return; }
    const {svg,b}=out;
    const img=new Image();
    img.onload=()=>{
      const cv=document.createElement("canvas");
      cv.width=Math.max(1,Math.round(b.w*scale)); cv.height=Math.max(1,Math.round(b.h*scale));
      const ctx=cv.getContext("2d");
      if(jpg){ ctx.fillStyle="#ffffff"; ctx.fillRect(0,0,cv.width,cv.height); }
      ctx.scale(scale,scale); ctx.drawImage(img,0,0,b.w,b.h);
      resolve({cv,b});
    };
    img.onerror=()=>reject(new Error("svg rasterize failed"));

  });
}
let _pdfLibLoading=null;
function ensurePdfLib(){
  if(window.PDFLib) return Promise.resolve();
  if(_pdfLibLoading) return _pdfLibLoading;
  _pdfLibLoading=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js";
    s.onload=()=>res(); s.onerror=()=>{ _pdfLibLoading=null; rej(new Error("pdf-lib failed to load")); };
    document.head.appendChild(s);
  });
  return _pdfLibLoading;
}
window.__figgy.selectionSVG=selectionSVG;
window.__figgy.exportName=exportName;
window.__figgy.exportSelection=(...a)=>exportSelection(...a);
window.__figgy.SELset=s=>{SEL=new Set(s);};
async function exportSelection(ids, fmt, scale){
  const nodes=ids.map(N).filter(Boolean);
  if(!nodes.length){ toast("Select a frame or layer first"); return; }
  const name=exportName(ids);
  try{
    if(fmt==="svg"){
      const out=selectionSVG(ids); if(!out){ toast("Nothing to export"); return; }
      download(out.svg, name+".svg", "image/svg+xml"); toast("Exported "+name+".svg"); return;
    }
    if(fmt==="png"||fmt==="jpg"){
      const {cv}=await rasterizeSelection(ids, scale, fmt==="jpg");
      const mime=fmt==="jpg"?"image/jpeg":"image/png";
      cv.toBlob(bl=>{
        if(!bl){ toast("Export failed"); return; }
        download(bl, name+"."+fmt, mime); toast(`Exported ${name}.${fmt} @ ${scale}×`);
      }, mime, fmt==="jpg"?0.92:undefined);
      return;
    }
    if(fmt==="pdf"){
      toast("Building PDF…");
      const [{cv,b}] = await Promise.all([rasterizeSelection(ids, Math.max(scale,2), false), ensurePdfLib()]);
      const {PDFDocument}=window.PDFLib;
      const doc=await PDFDocument.create();
      const pg=doc.addPage([Math.max(1,b.w), Math.max(1,b.h)]);
      const pngBytes=Uint8Array.from(atob(cv.toDataURL("image/png").split(",")[1]), c=>c.charCodeAt(0));
      const im=await doc.embedPng(pngBytes);
      pg.drawImage(im,{x:0,y:0,width:pg.getWidth(),height:pg.getHeight()});
      download(new Blob([await doc.save()],{type:"application/pdf"}), name+".pdf", "application/pdf");
      toast("Exported "+name+".pdf"); return;
    }
  }catch(err){
    console.error(err);
    toast(String(err&&err.message).includes("taint") ? "Export blocked — a remote image tainted the canvas. Use uploaded/data-URI images." : "Export failed — see console");
  }
}
function exportPNG(){
  const b=contentBounds(); const scale=2; const svg=standaloneSVG(0);
  const img=new Image();
  img.onload=()=>{
    const cv=document.createElement("canvas"); cv.width=Math.max(1,Math.round(b.w*scale)); cv.height=Math.max(1,Math.round(b.h*scale));
    const ctx=cv.getContext("2d"); ctx.scale(scale,scale); ctx.drawImage(img,0,0);
    try{ cv.toBlob(bl=>{ if(!bl){ toast("PNG export failed"); return; } download(bl,(DOC.name||"design")+".png","image/png"); toast("Exported PNG"); }, "image/png"); }
    catch(err){ toast("PNG blocked (a remote image tainted the canvas). Use data-URI images."); }
  };
  img.onerror=()=>toast("PNG export failed");
  img.src="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);
}
function exportPrototype(){
  const frames=page().roots.map(N).filter(n=>n && n.type==="frame");
  if(!frames.length){ toast("Add at least one frame to export a prototype"); return; }
  const reacted=reactedNodes();
  let screens="";
  frames.forEach((fr,i)=>{
    let spots="";
    reacted.forEach(n=>{ if(topFrameOf(n)!==fr.id) return; const a=nodeAABB(n); const r=n.reactions[0];
      spots+=`<a class="hs" href="#" onclick="goTo('${fr.id===r.target?fr.id:r.target}','${r.transition||"instant"}');return false;" style="left:${(a.x-fr.x)}px;top:${(a.y-fr.y)}px;width:${a.w}px;height:${a.h}px"></a>`; });
    screens+=`<section class="screen" id="s_${fr.id}" style="display:${i===0?"block":"none"}"><div class="frame" style="width:${fr.w}px;height:${fr.h}px">${buildScreenSVG(fr)}${spots}</div></section>`;
  });
  const html=
`<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${esc(DOC.name||"Prototype")} — Raven Figgy prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a1f;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;overflow:hidden}
.stage{position:relative;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
.screen{position:absolute}
.frame{position:relative;background:#fff;box-shadow:0 24px 90px rgba(0,0,0,.55);transform-origin:center}
.frame>svg{display:block}

.frame:hover .hs{box-shadow:0 0 0 2px rgba(91,75,219,.45) inset}
.bar{position:fixed;top:0;left:0;right:0;height:42px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;color:rgba(255,255,255,.65);font-size:12px;opacity:0;transition:opacity .2s;z-index:10}
body:hover .bar{opacity:1}
.bar button{background:rgba(255,255,255,.12);border:none;color:#fff;height:26px;padding:0 11px;border-radius:6px;font-size:11px;cursor:pointer;margin-left:6px}
.screen.fade{animation:fade .18s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
</style></head>
<body>
<div class="bar"><span>${esc(DOC.name||"Prototype")} · Raven Figgy</span><span><button onclick="home()">⌂ First screen</button></span></div>
<div class="stage" id="stage">${screens}</div>
<script>
var FRAMES=${JSON.stringify(frames.map(f=>({id:f.id,w:f.w,h:f.h})))};
var FIRST=${JSON.stringify(frames[0].id)};
var curId=FIRST;
function fit(){
  var f=FRAMES.filter(function(x){return x.id===curId;})[0]; if(!f) return;
  var sc=Math.min((window.innerWidth-40)/f.w,(window.innerHeight-40)/f.h,1);
  var el=document.querySelector('#s_'+f.id+' .frame'); if(el) el.style.transform='scale('+sc+')';
}
function goTo(id,trans){
  var t=document.getElementById('s_'+id); if(!t) return;
  document.querySelectorAll('.screen').forEach(function(s){s.style.display='none';s.classList.remove('fade');});
  t.style.display='block'; if(trans==='dissolve') t.classList.add('fade');
  curId=id; fit();
}
function home(){ goTo(FIRST,'instant'); }
window.addEventListener('resize',fit);
window.addEventListener('keydown',function(e){
  var i=FRAMES.findIndex(function(x){return x.id===curId;});
  if(e.key==='ArrowRight'||e.key===' '){ if(i<FRAMES.length-1) goTo(FRAMES[i+1].id,'instant'); e.preventDefault(); }
  if(e.key==='ArrowLeft'){ if(i>0) goTo(FRAMES[i-1].id,'instant'); e.preventDefault(); }
});

  download(html, (DOC.name||"prototype")+"-prototype.html", "text/html");
  toast("Prototype exported — open the .html to click through it");
}

/* ════════════════ FILE: SAVE / NEW / OPEN ════════════════ */
function saveFiggy(){
  const data=JSON.stringify({ _format:"raven-figgy", version:1, doc:{ name:DOC.name, pages:DOC.pages, components:serializeComps(), cur:DOC.cur } });
  download(data, (DOC.name||"design")+".figgy", "application/json");
  toast("Saved .figgy");
}
function newDoc(){
  if(!confirm("Start a new document? Unsaved changes will be lost.")) return;
  DOC.name="Untitled"; DOC.pages=[blankPage("Page 1")]; DOC.components={}; DOC.cur=0;
  SEL=new Set(); drillRoot=null; UNDO.length=0; REDO.length=0;
  const dn=$("docName"); if(dn) dn.textContent=DOC.name;
  seedDemo(); renderScene(); renderPanels(); fitAll(); setTool("move");
}
$("openInput").onchange=e=>{
  const f=e.target.files[0]; e.target.value=""; if(!f) return;
  const ext=(f.name.split(".").pop()||"").toLowerCase();
  if(ext==="figgy"||ext==="json"){ const rd=new FileReader(); rd.onload=()=>loadFiggy(rd.result,f.name); rd.readAsText(f); }
  else if(ext==="svg"){ const rd=new FileReader(); rd.onload=()=>importSVG(rd.result,f.name); rd.readAsText(f); }
  else if(ext==="fig"){ handleFig(f); }
  else toast("Unsupported file type");
};
function loadFiggy(txt,name){
  try{
    const j=JSON.parse(txt); const d=j.doc||j;
    if(!d.pages || !Array.isArray(d.pages)) throw new Error("bad");
    DOC.name=d.name||name.replace(/\.[^.]+$/,""); DOC.pages=d.pages; DOC.components=d.components||{}; DOC.cur=Math.min(d.cur||0, d.pages.length-1);
    SEL=new Set(); drillRoot=null; UNDO.length=0; REDO.length=0;
    const dn=$("docName"); if(dn) dn.textContent=DOC.name;
    renderScene(); renderPanels(); fitAll();
    toast("Opened "+DOC.name);
  }catch(err){ console.error(err); toast("That .figgy file looks corrupted"); }
}
function importSVG(txt,name){
  snapshot();
  const node=defaults("image");
  node.src="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(txt)));
  node.name=name.replace(/\.svg$/i,"");
  let w=400,h=300;
  const wm=txt.match(/\bwidth="([\d.]+)/i), hm=txt.match(/\bheight="([\d.]+)/i), vb=txt.match(/viewBox="[\s\d.\-]*?([\d.]+)\s+([\d.]+)"/i);
  if(wm) w=parseFloat(wm[1]); else if(vb) w=parseFloat(vb[1]);
  if(hm) h=parseFloat(hm[1]); else if(vb) h=parseFloat(vb[2]);
  node.w=Math.max(1,Math.round(w)); node.h=Math.max(1,Math.round(h));
  const ctr=s2p({x:stage.clientWidth/2, y:stage.clientHeight/2});
  node.x=Math.round(ctr.x-node.w/2); node.y=Math.round(ctr.y-node.h/2);
  addNode(node,null); SEL=new Set([node.id]);
  renderScene(); renderPanels();
  infoModal('<b>SVG placed as an image</b><p style="margin:8px 0 0;color:var(--mist);font-size:12.5px;line-height:1.5">Raven Figgy imports SVG as a faithfully-rendered image layer. Turning an SVG back into individually editable vector nodes isn\u2019t supported in this version.</p>');
}
function figExportNotice(){
  infoModal('<b>Exporting to .fig isn\u2019t supported</b><p style="margin:8px 0 0;color:var(--mist);font-size:12.5px;line-height:1.5">The <code>.fig</code> format is Figma\u2019s proprietary, undocumented binary container, so it can\u2019t be written reliably outside Figma itself. To move a design <b>into</b> Figma, use <b>Export SVG</b> and drag the SVG onto a Figma canvas. To keep a fully-editable file here, use <b>Save .figgy</b>.</p>');
}
async function handleFig(file){
  if(typeof JSZip==="undefined"){ infoModal("<b>Couldn\u2019t open .fig</b><p style=\"margin:8px 0 0;color:var(--mist);font-size:12.5px\">The archive reader didn\u2019t load.</p>"); return; }
  toast("Reading .fig\u2026");
  try{
    const zip=await JSZip.loadAsync(file);
    let thumb=null;
    zip.forEach((p,fl)=>{ if(!thumb && /(thumbnail|preview|canvas)[^/]*\.(png|jpe?g)$/i.test(p)) thumb=fl; });
    if(!thumb) zip.forEach((p,fl)=>{ if(!thumb && /\.(png|jpe?g)$/i.test(p)) thumb=fl; });
    let placed=false;
    if(thumb){
      const b=await thumb.async("base64"); const mime=/\.png$/i.test(thumb.name)?"image/png":"image/jpeg";
      snapshot();
      const node=defaults("image"); node.src="data:"+mime+";base64,"+b; node.w=900; node.h=560; node.name=".fig preview";
      const ctr=s2p({x:stage.clientWidth/2, y:stage.clientHeight/2});
      node.x=Math.round(ctr.x-450); node.y=Math.round(ctr.y-280);
      addNode(node,null); SEL=new Set([node.id]); renderScene(); renderPanels(); fitAll(); placed=true;
    }
    infoModal('<b>About .fig files</b><p style="margin:8px 0 0;color:var(--mist);font-size:12.5px;line-height:1.5">'
      +(placed?"Raven Figgy found a preview image inside this .fig and placed it on the canvas. "
              :"Raven Figgy opened the .fig archive but didn\u2019t find an embedded preview image. ")
      +'The <code>.fig</code> format is Figma\u2019s proprietary, undocumented binary, so the editable layers can\u2019t be reliably decoded outside Figma. To bring a real design across, open it in Figma and <b>export SVG</b>, then open that SVG here.</p>');
  }catch(err){
    console.error(err);
    infoModal('<b>Couldn\u2019t read that .fig</b><p style="margin:8px 0 0;color:var(--mist);font-size:12.5px;line-height:1.5">It may be from a newer Figma version or not a standard archive. The <code>.fig</code> format is proprietary and undocumented, so its layers can\u2019t be decoded here. Export an <b>SVG</b> from Figma and open that instead.</p>');
  }
}

/* ════════════════ CLIPBOARD: COPY / PASTE / DUPLICATE ════════════════ */
let CLIP=null;
function serializeSubtree(n){ return { node:JSON.parse(JSON.stringify(n)), kids:(n.children||[]).map(id=>{ const c=N(id); return c?serializeSubtree(c):null; }).filter(Boolean) }; }
function materializeTree(tree, parentId, off){
  const o=JSON.parse(JSON.stringify(tree.node)); o.id=nid(); o.x+=off; o.y+=off; o.parent=parentId;
  o.children = isC(o)? [] : o.children;
  page().nodes[o.id]=o;
  (parentId?N(parentId).children:page().roots).push(o.id);
  if(isC(o)) tree.kids.forEach(k=>materializeTree(k, o.id, off));
  return o.id;
}
function copySel(){ const ids=[...SEL].map(N).filter(Boolean); if(!ids.length) return; CLIP=JSON.stringify(ids.map(serializeSubtree)); toast(ids.length+" copied"); }
function pasteSel(){ if(!CLIP) return; let trees; try{ trees=JSON.parse(CLIP); }catch(e){ return; } if(!trees.length) return;
  snapshot(); const newSel=new Set(); trees.forEach(t=>newSel.add(materializeTree(t,null,24)));
  SEL=newSel; drillRoot=null; renderScene(); renderPanels(); }
function dupSel(){ const ids=[...SEL].map(N).filter(Boolean); if(!ids.length) return;
  const trees=ids.map(serializeSubtree); snapshot(); const newSel=new Set();
  trees.forEach(t=>newSel.add(materializeTree(t, t.node.parent||null, 20)));
  SEL=newSel; drillRoot=null; renderScene(); renderPanels(); }
function nudge(dx,dy){ if(!SEL.size) return; snapshot(); SEL.forEach(id=>{ const n=N(id); if(n && !n.locked){ n.x+=dx; n.y+=dy; } }); renderScene(); renderRight(); }
function selectAll(){ SEL=new Set(page().roots.filter(id=>{ const n=N(id); return n && n.visible!==false && !n.locked; })); drillRoot=null; renderScene(); renderPanels(); }

/* ════════════════ KEYBOARD ════════════════ */
window.addEventListener("keydown", e=>{
  const ae=document.activeElement;
  const typing = ae && (ae.tagName==="INPUT" || ae.tagName==="TEXTAREA" || ae.isContentEditable);
  const mod = e.metaKey || e.ctrlKey;
  if($("present").classList.contains("on")){
    if(e.key==="Escape") exitPresent();
    else if(e.key==="ArrowRight"||e.key===" ") showScreen(PRES.idx+1);
    else if(e.key==="ArrowLeft") showScreen(PRES.idx-1);
    return;
  }
  if(typing){ if(e.key==="Escape" && ae.blur) ae.blur(); return; }

  if(mod){
    const k=e.key.toLowerCase();
    if(k==="z"){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); return; }
    if(k==="y"){ e.preventDefault(); redo(); return; }
    if(k==="c"){ e.preventDefault(); copySel(); return; }
    if(k==="v"){ e.preventDefault(); pasteSel(); return; }
    if(k==="d"){ e.preventDefault(); dupSel(); return; }
    if(k==="a"){ e.preventDefault(); selectAll(); return; }
    if(k==="g"){ e.preventDefault(); if(e.shiftKey) ungroup(); else group(); return; }
    if(k==="s"){ e.preventDefault(); saveFiggy(); return; }
    if(k==="o"){ e.preventDefault(); $("openInput").click(); return; }
    if(k==="n"){ e.preventDefault(); newDoc(); return; }
    if(k==="e"){ e.preventDefault(); exportSVG(); return; }
    if(k==="="||k==="+"){ e.preventDefault(); setZoom(VP.z*1.2); return; }
    if(k==="-"){ e.preventDefault(); setZoom(VP.z/1.2); return; }
    if(k==="0"){ e.preventDefault(); fitAll(); return; }
    return;
  }

  // Shift+A: toggle auto layout on selected container(s)
  if(e.shiftKey && (e.key==="A"||e.key==="a")){
    const targets=[...SEL].map(N).filter(n=>n && isC(n));
    if(targets.length){ e.preventDefault(); snapshot();
      targets.forEach(n=>{ if(n.layout){ n.layout=null; } else { n.layout=inferLayout(n); orderChildrenByPosition(n); } });
      renderScene(); renderPanels(); }
    return;
  }

  switch(e.key){
    case "v": case "V": setTool("move"); break;
    case "f": case "F": setTool("frame"); break;
    case "r": case "R": setTool("rect"); break;
    case "o": case "O": setTool("ellipse"); break;
    case "l": case "L": setTool("line"); break;
    case "p": case "P": setTool("pen"); break;
    case "t": case "T": setTool("text"); break;
    case "h": case "H": setTool("hand"); break;
    case "Escape": SEL=new Set(); drillRoot=null; closeAllPops(); renderScene(); renderPanels(); break;
    case "Delete": case "Backspace":
      if(SEL.size){ e.preventDefault(); snapshot(); [...SEL].forEach(id=>deleteNode(id)); SEL=new Set(); renderScene(); renderPanels(); } break;
    case "ArrowUp": e.preventDefault(); nudge(0, e.shiftKey?-10:-1); break;
    case "ArrowDown": e.preventDefault(); nudge(0, e.shiftKey?10:1); break;
    case "ArrowLeft": e.preventDefault(); nudge(e.shiftKey?-10:-1, 0); break;
    case "ArrowRight": e.preventDefault(); nudge(e.shiftKey?10:1, 0); break;
    case "+": case "=": setZoom(VP.z*1.2); break;
    case "-": setZoom(VP.z/1.2); break;
  }
});

window.addEventListener("resize", ()=>{ if($("present").classList.contains("on")) showScreen(PRES.idx); else renderScene(); });

  addNode(d1,f2.id);
  const star=defaults("star"); star.name="Star"; star.x=680; star.y=300; star.w=80; star.h=80; star.sides=5; star.innerRatio=0.45;
  star.fills=[{type:"solid",color:"#3aa6c9",opacity:1,visible:true}];

  btn.reactions=[{trigger:"click",action:"navigate",target:f2.id,transition:"dissolve"}];

function init(){
  const dn=$("docName"); if(dn) dn.textContent=DOC.name;
  if(!page().roots.length) seedDemo();
  setTool("move");
  renderScene(); renderPanels(); fitAll();
}
init();

})();
